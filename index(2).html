<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>House Price Prediction</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
<h1>🏠 House Price Prediction</h1>
<form action="/predict" method="POST">
<label>Area</label><input type="number" name="area" required>
<label>Bedrooms</label><input type="number" name="bedrooms" required>
<label>Bathrooms</label><input type="number" name="bathrooms" required>
<label>Stories</label><input type="number" name="stories" required>
<label>Parking</label><input type="number" name="parking" required>
<label>Main Road</label><select name="mainroad"><option value="1">Yes</option><option value="0">No</option></select>
<label>Guest Room</label><select name="guestroom"><option value="1">Yes</option><option value="0">No</option></select>
<label>Basement</label><select name="basement"><option value="1">Yes</option><option value="0">No</option></select>
<label>Hot Water Heating</label><select name="hotwaterheating"><option value="1">Yes</option><option value="0">No</option></select>
<label>Air Conditioning</label><select name="airconditioning"><option value="1">Yes</option><option value="0">No</option></select>
<label>Preferred Area</label><select name="prefarea"><option value="1">Yes</option><option value="0">No</option></select>
<label>Furnishing Status</label><select name="furnishingstatus"><option value="2">Furnished</option><option value="1">Semi-Furnished</option><option value="0">Unfurnished</option></select>
<button type="submit">Predict House Price</button>
</form>
{% if prediction_text %}
<div class="result">{{ prediction_text }}</div>
{% endif %}
</div>
</body>
</html>
